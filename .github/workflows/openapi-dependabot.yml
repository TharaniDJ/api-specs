name: OpenAPI Dependabot

on:
  schedule:
    - cron: "0 2 * * *"   # Daily at 02:00 UTC
  workflow_dispatch:     # Manual trigger

jobs:
  update-openapi-specs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout api-specs repo
        uses: actions/checkout@v4

      - name: Checkout your personal ballerina-library
        uses: actions/checkout@v4
        with:
          # FIXED: Pointing to your repo instead of the platform repo
          repository: TharaniDJ/ballerina-library 
          path: ballerina-library

      - name: Set up Ballerina
        uses: ballerina-platform/setup-ballerina@v1.1.0 
        with:
          version: 2201.10.0 

      - name: Run OpenAPI Dependabot
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # This will now work because 'TharaniDJ/ballerina-library' contains this folder
          cd ballerina-library/Dependabot
          bal run main.bal